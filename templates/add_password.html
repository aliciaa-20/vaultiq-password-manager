{% extends "layout.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card p-4 shadow-sm">

            <h2 class="mb-3">
                Add New Credential
            </h2>

            <p class="text-muted">
                Store your website login details securely.
            </p>

            <hr>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Website
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="website"
                        placeholder="https://example.com"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email / Username
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="email"
                        placeholder="username@example.com"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <div class="input-group">

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            name="password"
                            onkeyup="checkStrength()"
                            required>

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            onclick="togglePassword()"
                            id="showBtn">

                            Show

                        </button>

                    </div>

                    <div class="progress mt-3">

                        <div
                            id="strengthBar"
                            class="progress-bar"
                            style="width:0%;">

                        </div>

                    </div>

                    <small
                        id="strengthText"
                        class="text-muted">

                        Enter a password

                    </small>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Notes
                    </label>

                    <textarea
                        class="form-control"
                        rows="3"
                        name="notes"
                        id="notes"
                        maxlength="200"
                        placeholder="Optional notes..."
                        onkeyup="countCharacters()"></textarea>

                    <small
                        class="text-muted">

                        <span id="charCount">0</span>/200 characters

                    </small>

                </div>

                <div class="d-flex flex-wrap gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Save Credential

                    </button>

                    <button
                        type="button"
                        class="btn btn-dark"
                        onclick="generatePassword()">

                        Generate Password

                    </button>

                    <button
                        type="reset"
                        class="btn btn-outline-secondary">

                        Clear

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let pass=document.getElementById("password");
    let btn=document.getElementById("showBtn");

    if(pass.type==="password"){

        pass.type="text";
        btn.innerHTML="Hide";

    }

    else{

        pass.type="password";
        btn.innerHTML="Show";

    }

}

function generatePassword(){

    let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

    let password="";

    for(let i=0;i<16;i++){

        password+=chars.charAt(
            Math.floor(Math.random()*chars.length)
        );

    }

    document.getElementById("password").value=password;

    checkStrength();

}

function checkStrength(){

    let password=document.getElementById("password").value;

    let bar=document.getElementById("strengthBar");

    let text=document.getElementById("strengthText");

    let strength=0;

    if(password.length>=8)
        strength++;

    if(/[A-Z]/.test(password))
        strength++;

    if(/[0-9]/.test(password))
        strength++;

    if(/[!@#$%^&*]/.test(password))
        strength++;

    if(strength==0){

        bar.style.width="0%";
        bar.className="progress-bar";
        text.innerHTML="Enter a password";

    }

    else if(strength==1){

        bar.style.width="25%";
        bar.className="progress-bar bg-danger";
        text.innerHTML="Weak";

    }

    else if(strength==2){

        bar.style.width="50%";
        bar.className="progress-bar bg-warning";
        text.innerHTML="Medium";

    }

    else if(strength==3){

        bar.style.width="75%";
        bar.className="progress-bar bg-info";
        text.innerHTML="Good";

    }

    else{

        bar.style.width="100%";
        bar.className="progress-bar bg-success";
        text.innerHTML="Strong";

    }

}

function countCharacters(){

    let notes=document.getElementById("notes").value.length;

    document.getElementById("charCount").innerHTML=notes;

}

</script>

{% endblock %}
